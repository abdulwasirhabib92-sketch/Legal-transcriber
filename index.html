<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Transcriber Incognito</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  padding: 10px;
  background: #020617;
  text-align: center;
  font-weight: bold;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.controls {
  padding: 10px;
  background: #020617;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

button, input {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
}

textarea {
  width: 100%;
  height: 100%;
  background: #020617;
  color: #e5e7eb;
  border: none;
  padding: 10px;
  resize: none;
}

.split {
  flex: 1;
  display: flex;
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.panel h3 {
  margin: 0;
  padding: 5px;
  background: #020617;
  font-size: 14px;
}

.instructions {
  height: 80px;
}

video, audio {
  width: 100%;
  background: black;
}

@media (max-width: 768px) {
  .split {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>⚖️ Legal Transcriber (Private Mode)</header>

<div class="container">

  <div class="controls">
    <input type="file" id="mediaFile" accept="audio/*,video/*">
    <input type="file" id="textFile" accept=".txt">

    <button onclick="startTranscription()">Start</button>
    <button onclick="stopTranscription()">Stop</button>
    <button onclick="clearTranscript()">Clear</button>
  </div>

  <textarea class="instructions" id="instructions"
    placeholder="Task Instructions... (file-specific instructions override general rules)">
  </textarea>

  <div class="split">

    <div class="panel">
      <h3>Reference Transcript</h3>
      <textarea id="reference"></textarea>
    </div>

    <div class="panel">
      <h3>Live Transcript</h3>
      <textarea id="live"></textarea>
    </div>

  </div>

  <video id="player" controls></video>

</div>

<script>
let recognition;
let isRunning = false;

function loadTextFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("reference").value = e.target.result;
    localStorage.setItem("reference", e.target.result);
  };
  reader.readAsText(file);
}

function loadMedia(file) {
  const url = URL.createObjectURL(file);
  const player = document.getElementById("player");
  player.src = url;
}

document.getElementById("textFile").onchange = e => {
  loadTextFile(e.target.files[0]);
};

document.getElementById("mediaFile").onchange = e => {
  loadMedia(e.target.files[0]);
};

function startTranscription() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Speech recognition not supported in this browser");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = function(event) {
    let transcript = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }

    document.getElementById("live").value += transcript + " ";
    localStorage.setItem("live", document.getElementById("live").value);
  };

  recognition.start();
  isRunning = true;
}

function stopTranscription() {
  if (recognition && isRunning) {
    recognition.stop();
    isRunning = false;
  }
}

function clearTranscript() {
  document.getElementById("live").value = "";
  localStorage.removeItem("live");
}

window.onload = () => {
  document.getElementById("live").value =
    localStorage.getItem("live") || "";

  document.getElementById("reference").value =
    localStorage.getItem("reference") || "";

  document.getElementById("instructions").value =
    localStorage.getItem("instructions") || "";
};

document.getElementById("instructions").addEventListener("input", e => {
  localStorage.setItem("instructions", e.target.value);
});
</script>

</body>
</html>

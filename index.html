<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Transcriber V2.5</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  padding: 10px;
  background: #020617;
  text-align: center;
  font-weight: bold;
}

/* Layout */
.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.controls {
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: #020617;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.text-area {
  flex: 1;
  display: flex;
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.panel h3 {
  margin: 0;
  padding: 6px;
  background: #020617;
  font-size: 14px;
}

textarea {
  flex: 1;
  background: #020617;
  color: #e5e7eb;
  border: none;
  padding: 10px;
  resize: none;
}

/* Separate media zone */
.media-zone {
  padding: 12px;
  background: #020617;
  border-top: 2px solid #1e293b;
}

video {
  width: 100%;
  border-radius: 10px;
}

/* Mobile */
@media(max-width:768px){
  .text-area { flex-direction: column; }
}
</style>
</head>

<body>

<header>⚖️ Courtroom Transcriber V2.5</header>

<div class="container">

  <div class="controls">
    <input type="file" id="mediaFile" accept="audio/*,video/*">
    <input type="file" id="textFile" accept=".txt">

    <button onclick="startRec()">Start</button>
    <button onclick="stopRec()">Stop</button>
    <button onclick="insertTimestamp()">⏱</button>
    <button onclick="applyProcessing()">Apply Rules</button>
    <button onclick="compareText()">Compare</button>
  </div>

  <!-- Instruction Priority -->
  <textarea id="instructions" placeholder="FILE INSTRUCTIONS (Highest Priority)"></textarea>
  <textarea id="rules" placeholder="RULES / STYLE GUIDE"></textarea>

  <div class="main">

    <div class="text-area">
      <div class="panel">
        <h3>Reference Transcript</h3>
        <textarea id="ref"></textarea>
      </div>

      <div class="panel">
        <h3>Live Transcript</h3>
        <textarea id="live"></textarea>
      </div>
    </div>

    <!-- Media separated -->
    <div class="media-zone">
      <video id="player" controls></video>
    </div>

  </div>

</div>

<script>
let recognition;
let running = false;

const live = document.getElementById("live");
const ref = document.getElementById("ref");

mediaFile.onchange = e => {
  player.src = URL.createObjectURL(e.target.files[0]);
};

textFile.onchange = e => {
  const r = new FileReader();
  r.onload = ev => ref.value = ev.target.result;
  r.readAsText(e.target.files[0]);
};

function startRec(){
  if(!('webkitSpeechRecognition' in window)){
    alert("Use Chrome");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;

  recognition.onresult = e => {
    let t = "";
    for(let i=e.resultIndex;i<e.results.length;i++){
      t += e.results[i][0].transcript;
    }
    live.value += t + " ";
  };

  recognition.start();
  running = true;
}

function stopRec(){
  if(recognition && running){
    recognition.stop();
    running = false;
  }
}

/* =========================
   PRIORITY PROCESSING ENGINE
========================= */

function applyProcessing(){
  let text = live.value;

  const instructions = document.getElementById("instructions").value.toLowerCase();
  const rules = document.getElementById("rules").value.toLowerCase();

  // DEFAULT CLEANING
  text = text.replace(/\s+/g, " ");

  // RULES LAYER
  if(rules.includes("capitalize")){
    text = text.replace(/(^\w|\.\s*\w)/g, c => c.toUpperCase());
  }

  // INSTRUCTION OVERRIDE
  if(instructions.includes("uppercase")){
    text = text.toUpperCase();
  }

  if(instructions.includes("remove filler")){
    text = text.replace(/\b(um|uh|like)\b/gi, "");
  }

  if(instructions.includes("strict verbatim")){
    // override cleanup
    text = live.value;
  }

  live.value = text;
}

/* =========================
   COMPARE ENGINE
========================= */

function compareText(){
  let l = live.value.split(" ");
  let r = ref.value.split(" ");

  let output = "";

  for(let i=0;i<l.length;i++){
    if(l[i] !== r[i]){
      output += `<span style="background:red">${l[i]}</span> `;
    } else {
      output += l[i] + " ";
    }
  }

  live.innerHTML = output;
}

/* =========================
   UTIL
========================= */

function insertTimestamp(){
  live.value += `[${player.currentTime.toFixed(2)}s] `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Transcriber V2</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  padding: 10px;
  background: #020617;
  text-align: center;
  font-weight: bold;
}

.controls {
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: #020617;
}

button, select {
  padding: 6px;
  border-radius: 6px;
  border: none;
}

button { background: #2563eb; color: white; }

textarea {
  width: 100%;
  background: #020617;
  color: #e5e7eb;
  border: none;
  padding: 10px;
  resize: none;
}

.container { display: flex; flex-direction: column; height: 100vh; }

.split { flex: 1; display: flex; }

.panel { flex: 1; display: flex; flex-direction: column; }

.panel h3 {
  margin: 0;
  padding: 6px;
  background: #020617;
  font-size: 14px;
}

.mismatch {
  background: rgba(255,0,0,0.2);
}

video {
  width: 100%;
  background: black;
}

@media(max-width:768px){
  .split { flex-direction: column; }
}
</style>
</head>

<body>

<header>⚖️ Courtroom Transcriber V2</header>

<div class="controls">
  <input type="file" id="mediaFile" accept="audio/*,video/*">
  <input type="file" id="textFile" accept=".txt">

  <button onclick="startRec()">Start</button>
  <button onclick="stopRec()">Stop</button>
  <button onclick="insertTimestamp()">⏱</button>
  <button onclick="compareText()">Compare</button>
  <button onclick="exportTxt()">Export</button>

  <select onchange="setSpeed(this.value)">
    <option value="1">1x</option>
    <option value="1.5">1.5x</option>
    <option value="2">2x</option>
    <option value="0.75">0.75x</option>
  </select>

  <button onclick="jump(-5)">⏪ 5s</button>
  <button onclick="jump(5)">⏩ 5s</button>
</div>

<textarea id="instructions" placeholder="Instructions (file-specific overrides rules)"></textarea>

<div class="split">
  <div class="panel">
    <h3>Reference</h3>
    <textarea id="ref"></textarea>
  </div>

  <div class="panel">
    <h3>Live Transcript</h3>
    <textarea id="live"></textarea>
  </div>
</div>

<video id="player" controls></video>

<script>
let recognition;
let running = false;

const live = document.getElementById("live");
const ref = document.getElementById("ref");

function loadText(file){
  const r = new FileReader();
  r.onload = e => ref.value = e.target.result;
  r.readAsText(file);
}

function loadMedia(file){
  player.src = URL.createObjectURL(file);
}

mediaFile.onchange = e => loadMedia(e.target.files[0]);
textFile.onchange = e => loadText(e.target.files[0]);

function startRec(){
  if(!('webkitSpeechRecognition' in window)){
    alert("Use Chrome");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let t = "";
    for(let i=e.resultIndex;i<e.results.length;i++){
      t += e.results[i][0].transcript;
    }
    live.value += t + " ";
    save();
  };

  recognition.start();
  running = true;
}

function stopRec(){
  if(recognition && running){
    recognition.stop();
    running = false;
  }
}

function insertTimestamp(){
  let t = player.currentTime.toFixed(2);
  live.value += ` [${t}s] `;
}

function compareText(){
  let l = live.value.split(" ");
  let r = ref.value.split(" ");

  let result = "";

  for(let i=0;i<l.length;i++){
    if(l[i] !== r[i]){
      result += `<span class="mismatch">${l[i]}</span> `;
    } else {
      result += l[i] + " ";
    }
  }

  live.innerHTML = result;
}

function setSpeed(v){
  player.playbackRate = v;
}

function jump(sec){
  player.currentTime += sec;
}

function exportTxt(){
  const blob = new Blob([live.value], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "transcript.txt";
  a.click();
}

function save(){
  localStorage.setItem("live", live.value);
}

window.onload = ()=>{
  live.value = localStorage.getItem("live") || "";
};
</script>

</body>
</html>
